name: Update Submodules

on:
  repository_dispatch:
    types: [backend-updated, frontend-updated]

jobs:
  update:
    name: Pull latest submodule → push to dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update triggered submodule
        run: |
          if [ "${{ github.event.action }}" = "backend-updated" ]; then
            git submodule update --remote TripGen
            echo "SUBMODULE=TripGen" >> $GITHUB_ENV
          else
            git submodule update --remote walk-app-tomsk
            echo "SUBMODULE=walk-app-tomsk" >> $GITHUB_ENV
          fi

      - name: Commit and push if changed
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "Submodule already up to date, skipping."
          else
            git commit -m "chore: update ${{ env.SUBMODULE }} to latest main [skip ci]"
            git push origin dev
          fi

