name: Update Submodules

on:
  repository_dispatch:
    types:
      - backend-updated
      - frontend-updated

jobs:
  update:
    name: Pull latest submodule → push to dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          submodules: recursive
          token: ${{ secrets.GH_PAT }}   
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update triggered submodule
        run: |
          if [ "${{ github.event.action }}" = "backend-updated" ]; then
            echo "Updating TripGen submodule..."
            git submodule update --remote TripGen
          elif [ "${{ github.event.action }}" = "frontend-updated" ]; then
            echo "Updating walk-app-tomsk submodule..."
            git submodule update --remote walk-app-tomsk
          fi

      - name: Commit and push if changed
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "No changes — submodule already up to date."
          else
            git commit -m "chore: update ${{ github.event.action == 'backend-updated' && 'TripGen' || 'walk-app-tomsk' }} submodule to latest main"
            git push origin dev
          fi

