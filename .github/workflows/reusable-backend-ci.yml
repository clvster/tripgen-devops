name: Reusable — Backend CI
on:
  workflow_call:
    secrets:
      JWT_SECRET:
        required: false
      JWT_EXPIRATION:
        required: false
jobs:
  lint:
    name: Checkstyle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - name: Run Checkstyle
        run: mvn checkstyle:check -B --no-transfer-progress
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tripgen_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - name: Run tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/tripgen_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'testSecretKey1234567890ABCDEFGHIJKLMNOP' }}
          JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION || '86400000' }}
          ORS_API_KEY: placeholder
        run: mvn test -B --no-transfer-progress
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report-${{ github.run_id }}
          path: target/surefire-reports/
          retention-days: 7
