name: Reusable — Frontend CI

on:
  workflow_call:
    secrets:
      GH_PAT:
        required: false

jobs:
  lint-and-build:
    name: ESLint + build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.run_id }}
          path: dist/
          retention-days: 7

