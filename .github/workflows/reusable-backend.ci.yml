name: Reusable — Backend CI

on:
  workflow_call:
    secrets:
      GH_PAT:
        required: false

jobs:
  lint:
    name: Checkstyle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check -B --no-transfer-progress

  test:
    name: Maven build & test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn test -B --no-transfer-progress

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report-${{ github.run_id }}
          path: target/surefire-reports/
          retention-days: 7
