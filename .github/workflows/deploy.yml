name: Deploy — Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  bump-version:
    name: Bump major version & create release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: main

      - name: Bump major and tag
        id: bump
        run: |
          CURRENT=$(cat VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="$((MAJOR + 1)).$MINOR.$PATCH"
          echo "$NEW" > VERSION
          echo "new_version=$NEW" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: release v$NEW [skip ci]"
          git tag "v$NEW"
          git push origin main
          git push origin "v$NEW"

 deploy:
    name: Deploy → VPS (routegen.ru)
    runs-on: ubuntu-latest
    needs: bump-version
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/tripgen-devops

            git fetch origin main
            git checkout main
            git pull origin main
            cd walk-app-tomsk && git checkout -- . && cd ..
            git submodule update --init --remote --recursive

            cat > .env <<EOF
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
            JWT_EXPIRATION=86400000
            ORS_API_KEY=${{ secrets.ORS_API_KEY || 'placeholder' }}
            ENVIRONMENT=production
            EOF

            docker compose -f docker-compose.yml up --build -d --remove-orphans
            docker image prune -f
            docker compose -f docker-compose.yml ps

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            sleep 15
            curl --fail --silent http://127.0.0.1:8081/actuator/health \
              && echo "Backend: OK" || echo "Backend: not responding"
            curl --fail --silent http://127.0.0.1:3000/ \
              && echo "Frontend: OK" || echo "Frontend: not responding"
